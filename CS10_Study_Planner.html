<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS 10th Class — Smart Study Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a3a5c;
    --accent: #e8a020;
    --accent2: #2e7d5e;
    --light-bg: #f4f7fb;
    --card-bg: #ffffff;
    --border: #d0dce8;
    --text: #1a2535;
    --muted: #6b7e96;
    --ch1: #1a3a5c;
    --ch2: #2e7d5e;
    --ch3: #7b3f8a;
    --ch4: #c0392b;
    --ch5: #c67c00;
    --done-bg: #e8f8f0;
    --done-border: #2e7d5e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--light-bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== COVER ===== */
  .cover {
    background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 50%, #1e4d7a 100%);
    color: white;
    padding: 40px 30px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .cover::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(232,160,32,0.15);
  }
  .cover::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 150px; height: 150px;
    border-radius: 50%;
    background: rgba(46,125,94,0.15);
  }
  .cover-badge {
    display: inline-block;
    background: var(--accent);
    color: #1a2535;
    font-size: 11px;
    font-weight: 800;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .cover h1 {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .cover h1 span { color: var(--accent); }
  .cover-sub {
    font-size: 14px;
    opacity: 0.75;
    margin-bottom: 24px;
  }

  /* Student Info */
  .student-info {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
    text-align: left;
  }
  .info-field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.6;
    margin-bottom: 4px;
  }
  .info-field input {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: white;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    width: 100%;
    outline: none;
  }
  .info-field input::placeholder { opacity: 0.4; }
  .info-field input:focus { border-color: var(--accent); background: rgba(255,255,255,0.15); }

  /* ===== PROGRESS OVERVIEW ===== */
  .progress-section {
    background: white;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .progress-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .overall-bar-wrap {
    background: var(--light-bg);
    border-radius: 8px;
    height: 14px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .overall-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 8px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .progress-meta strong { color: var(--text); font-size: 14px; }
  .chapter-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chapter-pill {
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    border: 2px solid;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .pill-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  /* ===== MONTH TABS ===== */
  .month-tabs {
    display: flex;
    overflow-x: auto;
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 0 16px;
    gap: 2px;
    scrollbar-width: none;
  }
  .month-tabs::-webkit-scrollbar { display: none; }
  .month-tab {
    flex-shrink: 0;
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .month-tab:hover { color: var(--primary); }
  .month-tab.active {
    color: var(--primary);
    border-bottom-color: var(--accent);
  }

  /* ===== MONTH PANELS ===== */
  .month-panel { display: none; padding: 20px 16px; }
  .month-panel.active { display: block; }

  .month-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .month-name {
    font-size: 20px;
    font-weight: 800;
    color: var(--primary);
  }
  .month-progress-badge {
    background: var(--light-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  /* ===== CHAPTER CARD ===== */
  .chapter-card {
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
  }
  .chapter-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .ch-num {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
  }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
  }
  .ch-progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .ch-mini-bar {
    flex: 1;
    height: 4px;
    border-radius: 4px;
    background: var(--light-bg);
    overflow: hidden;
  }
  .ch-mini-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s;
    width: 0%;
  }
  .ch-count { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .ch-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .chapter-card.open .ch-arrow { transform: rotate(180deg); }

  /* ===== TOPICS TABLE ===== */
  .topics-wrap { display: none; }
  .chapter-card.open .topics-wrap { display: block; }
  .topics-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .topics-table thead tr {
    background: var(--light-bg);
    border-top: 1px solid var(--border);
  }
  .topics-table th {
    padding: 8px 10px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    text-align: left;
  }
  .topics-table th.center { text-align: center; }
  .topics-table td {
    padding: 9px 10px;
    border-top: 1px solid #eef2f7;
    vertical-align: middle;
  }
  .topics-table tr:hover td { background: #f9fbff; }
  .topics-table tr.done-row td { background: var(--done-bg); }

  .topic-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    white-space: nowrap;
  }
  .topic-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .topic-name.done { text-decoration: line-through; color: var(--muted); }

  /* Tick checkbox */
  .tick-cell { text-align: center; }
  .tick-box {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: white;
    font-size: 13px;
  }
  .tick-box:hover { border-color: var(--accent2); background: #e8f8f0; }
  .tick-box.ticked {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
  }

  /* Date input */
  .date-input {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 6px;
    font-family: 'Tajawal', sans-serif;
    font-size: 11px;
    color: var(--text);
    width: 100px;
    background: white;
    outline: none;
  }
  .date-input:focus { border-color: var(--accent); }
  .date-input.filled { background: #fffbf0; border-color: var(--accent); }

  /* Teacher sign */
  .sign-input {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 6px;
    font-family: 'Tajawal', sans-serif;
    font-size: 11px;
    color: var(--text);
    width: 70px;
    background: white;
    outline: none;
    text-align: center;
  }
  .sign-input:focus { border-color: var(--primary); }
  .sign-input.signed { background: #f0f4ff; border-color: var(--primary); }

  /* ===== ALL CHAPTERS VIEW ===== */
  #all-panel { padding: 20px 16px; display: none; }
  #all-panel.active { display: block; }

  /* ===== PRINT ===== */
  .print-btn {
    display: block;
    margin: 0 16px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s;
  }
  .print-btn:hover { background: #122d47; }

  @media print {
    .month-tabs, .print-btn { display: none !important; }
    .month-panel { display: block !important; }
    .topics-wrap { display: block !important; }
    body { background: white; }
    .cover { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  }
</style>
</head>
<body>

<!-- COVER -->
<div class="cover">
  <div class="cover-badge">PCTB Punjab Board</div>
  <h1>Computer Science <span>10th Class</span><br>Smart Study Planner</h1>
  <p class="cover-sub">Topic-wise Progress Tracker • Month Schedule • Teacher Sign</p>
  <div class="student-info">
    <div class="info-field">
      <label>Student Name / طالب علم کا نام</label>
      <input type="text" placeholder="Enter name...">
    </div>
    <div class="info-field">
      <label>Roll No / رول نمبر</label>
      <input type="text" placeholder="Roll number">
    </div>
    <div class="info-field">
      <label>School / اسکول</label>
      <input type="text" placeholder="School name">
    </div>
    <div class="info-field">
      <label>Academic Year / تعلیمی سال</label>
      <input type="text" placeholder="2025–2026">
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-section">
  <div class="progress-title">Overall Progress / مجموعی پیش رفت</div>
  <div class="overall-bar-wrap"><div class="overall-bar" id="overall-bar"></div></div>
  <div class="progress-meta">
    <span>Completed: <strong id="done-count">0</strong> topics</span>
    <span>Remaining: <strong id="rem-count">0</strong> topics</span>
    <span><strong id="pct-count">0%</strong></span>
  </div>
  <div class="chapter-pills" id="chapter-pills"></div>
</div>

<!-- MONTH TABS -->
<div class="month-tabs">
  <div class="month-tab active" data-month="aug" onclick="switchMonth('aug',this)">Aug</div>
  <div class="month-tab" data-month="sep" onclick="switchMonth('sep',this)">Sep</div>
  <div class="month-tab" data-month="oct" onclick="switchMonth('oct',this)">Oct</div>
  <div class="month-tab" data-month="nov" onclick="switchMonth('nov',this)">Nov</div>
  <div class="month-tab" data-month="dec" onclick="switchMonth('dec',this)">Dec</div>
  <div class="month-tab" data-month="jan" onclick="switchMonth('jan',this)">Jan</div>
  <div class="month-tab" data-month="feb" onclick="switchMonth('feb',this)">Feb</div>
  <div class="month-tab" data-month="all" onclick="switchMonth('all',this)">📋 All</div>
</div>

<div id="panels-container"></div>

<button class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>

<script>
// ===== DATA =====
const CHAPTERS = [
  {
    id: 1,
    name: "Unit 1: Introduction to Programming",
    urdu: "پروگرامنگ کا تعارف",
    color: "#1a3a5c",
    month: "aug",
    topics: [
      "What is Programming?",
      "Types of Programming Languages",
      "Introduction to IDE (Integrated Development Environment)",
      "Introduction to C Language",
      "Syntax and Structure of C Language",
      "Keywords and Identifiers",
      "Data Types in C",
      "Variables and Constants",
      "Comments in C",
      "Writing First C Program",
    ]
  },
  {
    id: 2,
    name: "Unit 2: User Interface",
    urdu: "یوزر انٹرفیس",
    color: "#2e7d5e",
    month: "oct",
    topics: [
      "Input and Output Functions (printf, scanf)",
      "Format Specifiers",
      "Escape Sequences",
      "Arithmetic Operators",
      "Relational Operators",
      "Logical Operators",
      "Assignment Operators",
      "Increment and Decrement Operators",
      "Expression and Precedence of Operators",
    ]
  },
  {
    id: 3,
    name: "Unit 3: Conditional Logic",
    urdu: "مشروط منطق",
    color: "#7b3f8a",
    month: "nov",
    topics: [
      "Control Structures Overview",
      "if Statement",
      "if-else Statement",
      "Nested if-else Statement",
      "else-if Ladder",
      "switch Statement",
      "break Statement in switch",
      "Conditional (Ternary) Operator",
      "Practical Programs with Conditions",
    ]
  },
  {
    id: 4,
    name: "Unit 4: Data and Repetition",
    urdu: "ڈیٹا اور تکرار",
    color: "#c0392b",
    month: "dec",
    topics: [
      "Introduction to Loops",
      "while Loop",
      "do-while Loop",
      "for Loop",
      "Nested Loops",
      "break Statement in Loops",
      "continue Statement",
      "Introduction to Arrays",
      "Array Declaration and Initialization",
      "Accessing Array Elements",
      "Practical Programs with Loops and Arrays",
    ]
  },
  {
    id: 5,
    name: "Unit 5: Functions",
    urdu: "فنکشنز",
    color: "#c67c00",
    month: "jan",
    topics: [
      "What is a Function?",
      "Advantages of Functions",
      "Types of Functions",
      "Function Declaration (Prototype)",
      "Function Definition",
      "Function Call",
      "Actual and Formal Parameters",
      "Return Statement",
      "Void Functions",
      "Functions with Return Values",
      "Recursive Functions (Introduction)",
      "Practical Programs with Functions",
    ]
  }
];

const MONTHS = {
  aug:  { label: "August / اگست",       range: "Aug 1 – Aug 31",   chapters: [1] },
  sep:  { label: "September / ستمبر",   range: "Sep 1 – Sep 30",   chapters: [1] },
  oct:  { label: "October / اکتوبر",    range: "Oct 1 – Oct 31",   chapters: [2] },
  nov:  { label: "November / نومبر",    range: "Nov 1 – Nov 30",   chapters: [3] },
  dec:  { label: "December / دسمبر",    range: "Dec 1 – Dec 31",   chapters: [4] },
  jan:  { label: "January / جنوری",     range: "Jan 1 – Jan 31",   chapters: [5] },
  feb:  { label: "February / فروری",    range: "Feb 1 – Feb 28",   chapters: [1,2,3,4,5] }, // Revision
};

// ===== STATE =====
let state = {}; // { topicKey: { ticked, date, sign } }

function topicKey(chId, tIdx) { return `ch${chId}_t${tIdx}`; }

function getState(chId, tIdx) {
  const k = topicKey(chId, tIdx);
  if (!state[k]) state[k] = { ticked: false, date: '', sign: '' };
  return state[k];
}

// ===== RENDER =====
function renderChapterCard(ch, showAll) {
  const total = ch.topics.length;
  const done = ch.topics.filter((_, i) => getState(ch.id, i).ticked).length;
  const pct = total ? Math.round(done/total*100) : 0;

  return `
  <div class="chapter-card" id="card-${ch.id}-${showAll?'all':ch.month}" onclick="toggleCard(this)">
    <div class="chapter-header">
      <div class="ch-num" style="background:${ch.color}">${ch.id}</div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div style="font-size:11px;color:#888;margin-top:1px;">${ch.urdu}</div>
        <div class="ch-progress-row">
          <div class="ch-mini-bar">
            <div class="ch-mini-fill" style="background:${ch.color};width:${pct}%"></div>
          </div>
          <span class="ch-count">${done}/${total} (${pct}%)</span>
        </div>
      </div>
      <div class="ch-arrow">▼</div>
    </div>
    <div class="topics-wrap">
      <table class="topics-table">
        <thead>
          <tr>
            <th style="width:28px">#</th>
            <th>Topic Name / عنوان</th>
            <th class="center" style="width:38px">✓ Done</th>
            <th style="width:110px">Date / تاریخ</th>
            <th style="width:80px">Teacher Sign</th>
          </tr>
        </thead>
        <tbody>
          ${ch.topics.map((t, i) => {
            const s = getState(ch.id, i);
            const k = topicKey(ch.id, i);
            return `
            <tr class="${s.ticked ? 'done-row' : ''}" id="row-${k}">
              <td class="topic-num">${ch.id}.${i+1}</td>
              <td class="topic-name ${s.ticked ? 'done' : ''}" id="name-${k}">${t}</td>
              <td class="tick-cell">
                <div class="tick-box ${s.ticked ? 'ticked' : ''}" id="tick-${k}"
                  onclick="event.stopPropagation(); toggleTick('${k}')">
                  ${s.ticked ? '✓' : ''}
                </div>
              </td>
              <td>
                <input type="date" class="date-input ${s.date ? 'filled' : ''}" id="date-${k}"
                  value="${s.date}"
                  onclick="event.stopPropagation()"
                  onchange="event.stopPropagation(); saveDate('${k}', this.value)">
              </td>
              <td>
                <input type="text" class="sign-input ${s.sign ? 'signed' : ''}" id="sign-${k}"
                  value="${s.sign}" placeholder="____"
                  onclick="event.stopPropagation()"
                  oninput="event.stopPropagation(); saveSign('${k}', this.value)">
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderAllPanels() {
  const container = document.getElementById('panels-container');
  let html = '';

  // Month panels
  Object.entries(MONTHS).forEach(([mKey, mData]) => {
    const isRevision = mKey === 'feb';
    html += `<div class="month-panel ${mKey==='aug'?'active':''}" id="panel-${mKey}">
      <div class="month-header">
        <div class="month-name">${mData.label}</div>
        <div class="month-progress-badge" id="mprog-${mKey}">0%</div>
      </div>
      ${isRevision ? `<div style="background:#fff8e1;border:1px solid #fbc02d;border-radius:8px;padding:10px 14px;font-size:12px;color:#7a5800;margin-bottom:14px;">📚 <strong>Revision Month:</strong> All chapters review, practice papers & exam preparation.</div>` : ''}
      ${mData.chapters.map(cid => renderChapterCard(CHAPTERS.find(c=>c.id===cid), false)).join('')}
    </div>`;
  });

  // All panel
  html += `<div id="all-panel">
    <div class="month-header">
      <div class="month-name">All Chapters / تمام ابواب</div>
    </div>
    ${CHAPTERS.map(ch => renderChapterCard(ch, true)).join('')}
  </div>`;

  container.innerHTML = html;
}

function renderPills() {
  const pillsEl = document.getElementById('chapter-pills');
  pillsEl.innerHTML = CHAPTERS.map(ch => {
    const total = ch.topics.length;
    const done = ch.topics.filter((_,i) => getState(ch.id,i).ticked).length;
    return `<div class="chapter-pill" style="border-color:${ch.color};color:${ch.color}">
      <div class="pill-dot" style="background:${ch.color}"></div>
      Ch${ch.id}: ${done}/${total}
    </div>`;
  }).join('');
}

function updateProgress() {
  let total = 0, done = 0;
  CHAPTERS.forEach(ch => {
    total += ch.topics.length;
    done += ch.topics.filter((_,i) => getState(ch.id,i).ticked).length;
  });
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('done-count').textContent = done;
  document.getElementById('rem-count').textContent = total - done;
  document.getElementById('pct-count').textContent = pct + '%';

  // update month progress badges
  Object.entries(MONTHS).forEach(([mKey, mData]) => {
    let mt = 0, md = 0;
    mData.chapters.forEach(cid => {
      const ch = CHAPTERS.find(c=>c.id===cid);
      mt += ch.topics.length;
      md += ch.topics.filter((_,i) => getState(cid,i).ticked).length;
    });
    const el = document.getElementById('mprog-'+mKey);
    if (el) el.textContent = mt ? Math.round(md/mt*100)+'%' : '0%';
  });

  renderPills();
}

// ===== INTERACTIONS =====
function toggleCard(card) {
  card.classList.toggle('open');
}

function toggleTick(k) {
  const s = state[k] || (state[k] = { ticked:false, date:'', sign:'' });
  s.ticked = !s.ticked;

  const tick = document.querySelectorAll(`[id="tick-${k}"]`);
  const name = document.querySelectorAll(`[id="name-${k}"]`);
  const row  = document.querySelectorAll(`[id="row-${k}"]`);

  tick.forEach(el => {
    el.classList.toggle('ticked', s.ticked);
    el.textContent = s.ticked ? '✓' : '';
  });
  name.forEach(el => el.classList.toggle('done', s.ticked));
  row.forEach(el => el.classList.toggle('done-row', s.ticked));

  // Auto-fill date
  if (s.ticked && !s.date) {
    const today = new Date().toISOString().split('T')[0];
    s.date = today;
    document.querySelectorAll(`[id="date-${k}"]`).forEach(el => {
      el.value = today;
      el.classList.add('filled');
    });
  }

  updateProgress();
  refreshChapterBars();
  saveToStorage();
}

function saveDate(k, val) {
  if (!state[k]) state[k] = { ticked:false, date:'', sign:'' };
  state[k].date = val;
  document.querySelectorAll(`[id="date-${k}"]`).forEach(el => el.classList.toggle('filled', !!val));
  saveToStorage();
}

function saveSign(k, val) {
  if (!state[k]) state[k] = { ticked:false, date:'', sign:'' };
  state[k].sign = val;
  document.querySelectorAll(`[id="sign-${k}"]`).forEach(el => el.classList.toggle('signed', !!val));
  saveToStorage();
}

function refreshChapterBars() {
  CHAPTERS.forEach(ch => {
    const total = ch.topics.length;
    const done = ch.topics.filter((_,i) => getState(ch.id,i).ticked).length;
    const pct = total ? Math.round(done/total*100) : 0;
    document.querySelectorAll(`.ch-mini-fill`).forEach(() => {});
    // update via card id (multiple cards per chapter possible)
    document.querySelectorAll(`[id^="card-${ch.id}-"] .ch-mini-fill`).forEach(el => el.style.width = pct+'%');
    document.querySelectorAll(`[id^="card-${ch.id}-"] .ch-count`).forEach(el => el.textContent = `${done}/${total} (${pct}%)`);
  });
}

function switchMonth(mKey, tabEl) {
  document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  document.querySelectorAll('.month-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('all-panel').classList.remove('active');
  if (mKey === 'all') {
    document.getElementById('all-panel').classList.add('active');
  } else {
    const panel = document.getElementById('panel-'+mKey);
    if (panel) panel.classList.add('active');
  }
}

// ===== LOCAL STORAGE =====
function saveToStorage() {
  try { localStorage.setItem('cs10planner', JSON.stringify(state)); } catch(e) {}
}
function loadFromStorage() {
  try {
    const saved = localStorage.getItem('cs10planner');
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
}

// ===== INIT =====
loadFromStorage();
renderAllPanels();
updateProgress();
refreshChapterBars();
</script>
</body>
</html>
